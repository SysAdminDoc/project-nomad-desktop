<div id="shortcuts-overlay" class="shortcuts-overlay" role="dialog" aria-modal="true" aria-labelledby="shortcuts-title" hidden>
  <div class="shortcuts-dialog">
    <div class="shortcuts-header">
      <h3 id="shortcuts-title" class="shortcuts-title">Keyboard Shortcuts</h3>
      <button class="btn btn-sm btn-ghost shortcuts-close" type="button" data-shell-action="toggle-shortcuts" aria-label="Close keyboard shortcuts help">x</button>
    </div>
    <div class="shortcuts-grid">
      <kbd class="shortcuts-key">Alt+1-9</kbd><span>Switch tabs</span>
      <kbd class="shortcuts-key">Ctrl+K</kbd><span>Global search</span>
      <kbd class="shortcuts-key">Alt+N</kbd><span>New note</span>
      <kbd class="shortcuts-key">Alt+T</kbd><span>Toggle timer</span>
      <kbd class="shortcuts-key">Alt+C</kbd><span>Toggle LAN chat</span>
      <kbd class="shortcuts-key">Alt+Q</kbd><span>Quick actions</span>
      <kbd class="shortcuts-key">?</kbd><span>This help dialog</span>
    </div>
  </div>
</div>
