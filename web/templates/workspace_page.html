<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#4f9cf7">
<title>{{ page_title }} · NOMAD Field Desk v{{ version }}</title>
<link rel="stylesheet" href="/static/maplibre-gl.css">
{% if bundle_css %}
<link rel="stylesheet" href="/static/dist/{{ bundle_css }}">
{% else %}
<link rel="stylesheet" href="/static/css/app.css">
<link rel="stylesheet" href="/static/css/premium.css">
{% endif %}
<script src="/static/maplibre-gl.js"></script>
<script src="/static/pmtiles.js"></script>
<script src="/static/js/epub.min.js"></script>
</head>
<body data-workspace-page="{{ active_tab }}">

<a href="#main-content" class="skip-link">Skip to main content</a>

<div id="app-frame-overlay" class="app-frame-overlay-shell" role="dialog" aria-modal="true" aria-labelledby="app-frame-title" aria-label="Application viewer">
  <div class="app-frame-head">
    <span id="app-frame-title" class="app-frame-title"></span>
    <div class="app-frame-actions">
      <button class="btn btn-sm" type="button" data-shell-action="print-app-frame" aria-label="Print application frame">Print</button>
      <button class="btn btn-sm btn-danger" type="button" data-shell-action="close-app-frame" aria-label="Close application frame">Close</button>
    </div>
  </div>
  <iframe id="app-frame-iframe" title="Application content frame"></iframe>
</div>

{% include 'index_partials/_shell.html' %}

{% include workspace_partial %}

{% include 'index_partials/_utility_overlays.html' %}

{% include 'index_partials/_shortcuts_overlay.html' %}

{% if bundle_js %}
<script src="/static/dist/{{ bundle_js }}"></script>
{% else %}
<script src="/static/js/api.js"></script>
<script src="/static/js/toast.js"></script>
<script src="/static/js/offline.js"></script>
<script src="/static/js/battery.js"></script>
<script src="/static/js/chart.js"></script>
<script src="/static/js/i18n.js"></script>
<script src="/static/js/events.js"></script>
{% endif %}

<script>
window.NOMAD_ACTIVE_TAB = {{ active_tab|tojson }};
window.NOMAD_WORKSPACE_ROUTES = {{ workspace_routes|tojson }};
window.NOMAD_ALLOW_LAUNCH_RESTORE = {{ allow_launch_restore|tojson }};
</script>
<script>
{% include 'index_partials/_app_inline.js' %}
</script>
</body>
</html>
