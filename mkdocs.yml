site_name: N.O.M.A.D. Field Desk
site_description: Offline-first preparedness and field-operations desktop app
site_url: https://sysadmindoc.github.io/project-nomad-desktop/
repo_url: https://github.com/SysAdminDoc/project-nomad-desktop
repo_name: SysAdminDoc/project-nomad-desktop

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started: guide/01-getting-started.md
  - Features:
